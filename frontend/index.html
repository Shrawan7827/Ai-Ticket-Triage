<!DOCTYPE html>
<html>
<head>
  <title>AI Ticket Analyzer</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    textarea {
      width: 300px;
      height: 100px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h2>AI Support Ticket Analyzer</h2>

  <textarea id="message" placeholder="Describe your issue..."></textarea><br>
  <button onclick="submitTicket()">Analyze</button>

  <div class="card" id="result"></div>

  <h3>Previous Tickets</h3>
  <div id="tickets"></div>

  <script src="script.js"></script>

</body>
</html>
